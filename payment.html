<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
</head>
<body style="text-align:center; font-family:sans-serif">

  <h2>Pay ₹500 Admission Fees</h2>

  <p>UPI ID: rajdeep@upi</p>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=rajdeep@upi&pn=Rajdeep&am=500">

  <br><br>

  <button onclick="completePayment()">I Have Paid ✅</button>

<script>
function completePayment() {
  // payment done mark karo
  localStorage.setItem("paid", "yes");

  // backend ko data bhejo
  fetch("/submit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: localStorage.getItem("name"),
      email: localStorage.getItem("email"),
      course: localStorage.getItem("course"),
      paid: "yes"
    })
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
    window.location.href = "/";
  });
}
</script>

  <script>
    function done() {
      localStorage.setItem("paid", "yes");
      window.location.href = "/";
    }
  </script>

</body>
</html>
