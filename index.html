<!DOCTYPE html>
<html>
<head>
  <title>Admission Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-black to-gray-900 text-white flex items-center justify-center h-screen">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-96">
    <h1 class="text-2xl font-bold text-center mb-6">🎓 Admission Form</h1>

    <form action="/submit" method="POST" class="flex flex-col gap-4">
      <input type="text" name="name" placeholder="Your Name" required
        class="p-3 rounded bg-gray-700 outline-none">

      <input type="email" name="email" placeholder="Your Email" required
        class="p-3 rounded bg-gray-700 outline-none">

      <input type="text" name="course" placeholder="Course" required
        class="p-3 rounded bg-gray-700 outline-none">

      <button type="submit"
        class="bg-green-400 text-black font-bold py-2 rounded hover:bg-green-300 transition">
        Apply Now 🚀
      </button>
      
    </form>
    <button onclick="payNow()">Pay Fees</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
async function payNow() {
  console.log("clicked"); // test

  const res = await fetch('/pay');
  const data = await res.json();

  var options = {
    key: "YOUR_KEY",
    amount: data.amount,
    currency: "INR",
    order_id: data.id,
    name: "Admission Fees",
    description: "Payment",
    handler: function (response){
      alert("Payment Success ✅");
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}
</script>
  </div>

</body>
</html>
