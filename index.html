<!DOCTYPE html>
<html>
<head>
  <title>Admission Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-black to-gray-900 text-white flex items-center justify-center h-screen">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-96">
    <h1 class="text-2xl font-bold text-center mb-6">🎓 Admission Form</h1>

    <form action="/submit" method="POST" class="flex flex-col gap-4">
      <input type="text" name="name" placeholder="Your Name" required
        class="p-3 rounded bg-gray-700 outline-none">

      <input type="email" name="email" placeholder="Your Email" required
        class="p-3 rounded bg-gray-700 outline-none">

      <input type="text" name="course" placeholder="Course" required
        class="p-3 rounded bg-gray-700 outline-none">

      <button type="submit"
        class="bg-green-400 text-black font-bold py-2 rounded hover:bg-green-300 transition">
        Apply Now 🚀
      </button>
      
    </form>
    <h3>Pay ₹500 via UPI</h3>

    <p>UPI ID: rajdeep37800@ptyes</p>

    <img src="https://res.cloudinary.com/dlt2s4f50/image/upload/v1776530875/WhatsApp_Image_2026-04-15_at_10.19.57_fdynor.jpg" height="25px" style="text-align: center;">

    <br><br>

    <input type="file" name="proof" />
    <button>Submit Payment Proof</button>
  </div>

</body>
</html>
