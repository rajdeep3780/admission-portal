<!DOCTYPE html>
<html>
<head>
  <title>Admission Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-black to-gray-900 text-white flex items-center justify-center h-screen">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-96">
    <h1 class="text-2xl font-bold text-center mb-6">🎓 Admission Form</h1>

    <form id="admissionForm" method="POST">
      <input type="text" name="name" placeholder="Your Name" required
        class="p-3 rounded bg-gray-700 outline-none">

      <input type="email" name="email" placeholder="Your Email" required
        class="p-3 rounded bg-gray-700 outline-none">

      <input type="text" name="course" placeholder="Course" required
        class="p-3 rounded bg-gray-700 outline-none">

      <button type="button" onclick="goToPayment()">Apply</button>
      
    </form>
    

<script>
function goToPayment() {
  // form data save kar lo temporarily
  const form = document.getElementById("admissionForm");
  const formData = new FormData(form);

  localStorage.setItem("name", formData.get("name"));
  localStorage.setItem("email", formData.get("email"));
  localStorage.setItem("course", formData.get("course"));

  // payment page pe bhej do
  window.location.href = "/payment";
}
</script>
  </div>

</body>
</html>
